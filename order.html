<section class="order">

<h2>Flower order Form</h2>

<form>

<fieldset>

<legend>Customer Information</legend>

<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>Email</label>
<input type="email" placeholder="Enter your email" required>

<label>Phone Number</label>
<input type="tel" placeholder="Enter your phone number" required>

<label>Flower Type</label>
<select required>
<option value="">Choose a Flower</option>
<option>Rose</option>
<option>Tulip</option>
<option>Lily</option>
<option>Sunflower</option>
<option>Orchid</option>
</select>

<label>Quantity</label>
<input type="number" min="1" placeholder="Number of flowers" required>

<label>Delivery Date</label>
<input type="date" required>

<p><strong>Gender</strong></p>

<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female

<p><strong>Extra Services</strong></p>

<input type="checkbox"> Gift Wrap<br>
<input type="checkbox"> Greeting Card<br>
<input type="checkbox"> Home Delivery

<label>Delivery Address</label>
<textarea rows="4" placeholder="Enter delivery address"></textarea>

<label>Special Message</label>
<textarea rows="4" placeholder="Write your message"></textarea>

<br><br>

<input type="submit" value="order Now">

</fieldset>

</form>

</section>

<footer>
<p>&copy; 2026 Bloom Flower Shop</p>

</footer>
